# Verifies the login screen elements are present and interactive.
# Starts from fresh install, navigates through welcome, then checks login UI.
appId: app.esteem.mobile.android
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Welcome to"
    timeout: 15000

# Accept terms and navigate to login
- tapOn:
    text: "By accepting"
- tapOn:
    text: "Get started!"

- extendedWaitUntil:
    visible: "Login"
    timeout: 5000

# Verify login form elements
- assertVisible:
    text: "LOGIN"

- assertVisible:
    text: "Login with Hivesigner"

- assertVisible:
    text: "HiveAuth"

# Verify sign-up link
- assertVisible:
    text: "Sign up now"

# Test username input field
- tapOn:
    text: "username"
- inputText: "testuser123"

# Test password input field
- tapOn:
    text: "password"
- inputText: "fakekeyfortest"

# LOGIN button should be visible (we don't actually submit)
- assertVisible:
    text: "LOGIN"

# Navigate to sign-up
- tapOn:
    text: "Sign up now"

# Should show registration screen
- extendedWaitUntil:
    visible: "Sign up|Create account"
    timeout: 5000
