# Verifies the app launches successfully and reaches either the
# welcome screen (fresh install) or the feed screen (returning user).
appId: app.esteem.mobile.android
---
- launchApp:
    clearState: true

# Wait for splash/launch animation to complete (~4 seconds)
- extendedWaitUntil:
    visible: "Welcome to|Feed"
    timeout: 15000

# On a fresh install we should land on the welcome screen
- assertVisible:
    text: "Welcome to"
    optional: false

- assertVisible:
    text: "Ecency"

# Verify the three value proposition sections are visible
- assertVisible:
    text: "Are you looking for community?"

- assertVisible:
    text: "Get started!"
