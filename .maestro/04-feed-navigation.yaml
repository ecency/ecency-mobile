# Tests tab navigation when user is on the main screen.
# NOTE: This test requires the app to already have a logged-in session
# (or guest mode if available). If the app requires login, this test
# will be skipped via the conditional check below.
appId: app.esteem.mobile.android
---
- launchApp:
    clearState: false

# Wait for either the feed or the welcome screen
- extendedWaitUntil:
    visible: "Welcome to|Feed|Trending|Hot|New"
    timeout: 15000

# If we see the welcome screen, we can't test navigation — stop early
- runFlow:
    when:
      visible: "Welcome to"
    commands:
      - evalScript: |
          console.log("SKIP: App requires login — feed navigation test not applicable")

# If we're on the main feed, test tab navigation
- runFlow:
    when:
      notVisible: "Welcome to"
    commands:
      # Verify feed content is loading
      - assertVisible:
          text: "Feed|Trending|Hot|New"
          optional: true

      # Navigate to Wallet tab
      - tapOn:
          id: ".*wallet.*"
          optional: true
      - extendedWaitUntil:
          visible: "Wallet|HIVE|HBD|HP"
          timeout: 5000
          optional: true

      # Navigate to Notifications tab
      - tapOn:
          id: ".*notification.*"
          optional: true
      - extendedWaitUntil:
          visible: "Notification|Activities"
          timeout: 5000
          optional: true

      # Navigate back to Feed
      - tapOn:
          id: ".*home.*"
          optional: true
