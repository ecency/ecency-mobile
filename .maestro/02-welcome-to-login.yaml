# Tests the welcome → login navigation flow.
# Fresh install: accept terms, tap Get Started, arrive at login screen.
appId: app.esteem.mobile.android
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Welcome to"
    timeout: 15000

# Terms checkbox must be accepted before "Get started!" is enabled
- assertVisible:
    text: "By accepting, you agree to our Terms of Service"

# Tap the consent checkbox
- tapOn:
    text: "By accepting"

# Now "Get started!" button should be enabled — tap it
- tapOn:
    text: "Get started!"

# Should navigate to Login screen
- extendedWaitUntil:
    visible: "Login"
    timeout: 5000

- assertVisible:
    text: "Login"

- assertVisible:
    text: "To get all the benefits of using Ecency"
